version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: wholesale-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: medusa
      POSTGRES_PASSWORD: medusa_password
      POSTGRES_DB: wholesale_ecom
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medusa -d wholesale_ecom"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: wholesale-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://medusa:medusa_password@postgres:5432/wholesale_ecom
      STORE_CORS: http://localhost:3000
      ADMIN_CORS: http://localhost:3000
      AUTH_CORS: http://localhost:3000
      JWT_SECRET: supersecret
      COOKIE_SECRET: supersecret
      NODE_ENV: production
    ports:
      - "9000:9000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/backend:/app
      - /app/node_modules
    command: >
      sh -c "
        npx medusa db:migrate &&
        npm run seed &&
        npm run start
      "

volumes:
  postgres_data:
